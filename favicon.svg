      <stop offset="0%" style="stop-color:#FFDEE9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B5FFFC;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 배경 원 -->
  <circle cx="32" cy="32" r="30" fill="url(#pastelGrad)" />
  
  <!-- 동글동글하고 귀여운 눈 -->
  <circle cx="22" cy="28" r="3.5" fill="#4A4A4A" />
  <circle cx="42" cy="28" r="3.5" fill="#4A4A4A" />
  
  <!-- 발그레한 볼터치 -->
  <circle cx="17" cy="34" r="4.5" fill="#FF9E9E" opacity="0.7" />
  <circle cx="47" cy="34" r="4.5" fill="#FF9E9E" opacity="0.7" />
  
