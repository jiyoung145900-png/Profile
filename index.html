<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRock Korea - Classic ID Style</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --br-black: #000000; 
            --br-white: #ffffff; 
            --br-gray: #f9f9f9;
            --br-text-gray: #888888;
            --br-red: #e02020;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; padding: 20px; display: flex; flex-direction: column; align-items: center; color: white; }
        
        .wrapper { display: flex; gap: 40px; max-width: 1400px; width: 100%; justify-content: center; align-items: flex-start; margin-top: 30px; }
        
        /* 설정 패널 */
        .input-panel { width: 340px; background: #111; padding: 25px; border: 1px solid #222; border-radius: 12px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 11px; color: #666; font-weight: 700; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; font-size: 14px; }
        .btn-main { background: white; color: black; border: none; padding: 14px; cursor: pointer; width: 100%; font-weight: 900; margin-top: 10px; border-radius: 6px; text-transform: uppercase; }

        /* 사원증 디자인 - 홍길동 스타일 비율 */
        .id-card { 
            width: 460px; height: 680px; 
            background: var(--br-white); 
            position: relative; color: #000;
            display: flex; flex-direction: column; align-items: center; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            border-radius: 15px; overflow: hidden;
        }

        /* 블랙 헤더 */
        .card-header { 
            width: 100%; height: 90px; background: var(--br-black);
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }
        .br-logo-text { color: white; font-weight: 900; font-size: 34px; letter-spacing: -1px; text-transform: uppercase; }

        /* 장식 요소 */
        .gold-chip { position: absolute; top: 110px; left: 30px; width: 45px; height: 35px; background: linear-gradient(135deg, #d4af37, #f9e29c); border-radius: 6px; z-index: 10; opacity: 0.8; }
        .blue-dot { position: absolute; top: 110px; right: 30px; width: 40px; height: 40px; background: radial-gradient(circle, #e0f0ff, #ffffff); border-radius: 50%; z-index: 10; opacity: 0.5; filter: blur(2px); }

        /* 사진 영역 */
        .photo-area {
            width: 320px; height: 320px; margin-top: 30px;
            background: #eee; position: relative; overflow: hidden;
            z-index: 5; cursor: move; border: 1px solid #eee;
        }
        #displayPhoto { position: absolute; width: auto; height: 100%; min-width: 100%; user-select: none; -webkit-user-drag: none; }

        /* 인적사항 */
        .card-body { width: 100%; padding: 25px 40px; text-align: center; z-index: 10; }
        .emp-name { font-size: 40px; font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; color: #000; }
        .emp-role { font-size: 18px; font-weight: 700; color: #666; margin-bottom: 25px; }
        
        .divider { width: 100%; height: 1px; background: #eee; margin-bottom: 20px; }

        /* 데이터 리스트 - 우측 정렬 스타일 */
        .data-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .data-item { display: flex; justify-content: space-between; font-size: 13px; line-height: 1.2; }
        .data-label { color: var(--br-text-gray); font-weight: 600; text-transform: uppercase; }
        .data-value { color: #000; font-weight: 800; text-align: right; }

        /* 하단 푸터 */
        .footer-area { width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: absolute; bottom: 0; background: #fff; }
        .id-number { font-size: 11px; color: #aaa; font-weight: 500; letter-spacing: 2px; }
        .security-tag { font-size: 12px; color: var(--br-red); font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="input-panel">
        <h3 style="margin-bottom:20px; color:#fff;">CLASSIC ID SETTING</h3>
        <div class="form-group"><label>Profile Photo</label><input type="file" id="photoIn" accept="image/*"></div>
        <div class="form-group"><label>Full Name</label><input type="text" id="nameIn" value="KANG NOEUL"></div>
        <div class="form-group"><label>Title</label><input type="text" id="roleIn" value="Executive Director"></div>
        <div class="form-group"><label>Department</label><input type="text" id="deptIn" value="WEALTH MANAGEMENT"></div>
        <button class="btn-main" id="applyBtn">Update ID</button>
        <button class="btn-main" id="downBtn" style="background:#222; color:white; margin-top:10px;">Download PNG</button>
    </div>

    <div id="cardCapture" class="id-card">
        <div class="card-header"><div class="br-logo-text">BlackRock</div></div>
        <div class="gold-chip"></div>
        <div class="blue-dot"></div>

        <div class="photo-area" id="photoArea">
            <img id="displayPhoto" src="https://via.placeholder.com/400x400/ffffff/cccccc?text=PHOTO" style="top: 0px; left: 0px;">
        </div>

        <div class="card-body">
            <div class="emp-name" id="nameOut">KANG NOEUL</div>
            <div class="emp-role" id="outRole">Executive Director</div>
            <div class="divider"></div>
            
            <div class="data-list">
                <div class="data-item"><span class="data-label">Department</span><span class="data-value" id="deptOut">WEALTH MANAGEMENT</span></div>
                <div class="data-item"><span class="data-label">Issue Date</span><span class="data-value">APR 2026</span></div>
                <div class="data-item"><span class="data-label">Expiry Date</span><span class="data-value">APR 2031</span></div>
                <div class="data-item"><span class="data-label">Access Level</span><span class="data-value" style="color:var(--br-red)">LEVEL 4</span></div>
            </div>
        </div>

        <div class="footer-area">
            <div class="id-number">BR-7749-2026</div>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);
    const photoImg = $('displayPhoto');
    const photoArea = $('photoArea');

    $('photoIn').onchange = function(e) {
        if(this.files[0]) {
            const r = new FileReader();
            r.onload = e => {
                photoImg.src = e.target.result;
                photoImg.style.top = '0px';
                photoImg.style.left = '0px';
                photoImg.onload = () => {
                    if (photoImg.naturalHeight > photoImg.naturalWidth) {
                        photoImg.style.width = '100%'; photoImg.style.height = 'auto';
                    } else {
                        photoImg.style.height = '100%'; photoImg.style.width = 'auto';
                    }
                }
            };
            r.readAsDataURL(this.files[0]);
        }
    };

    $('applyBtn').onclick = () => {
        $('nameOut').innerText = $('nameIn').value;
        $('outRole').innerText = $('roleIn').value;
        $('deptOut').innerText = $('deptIn').value;
    };

    // 드래그 시스템
    let isDragging = false;
    let startX, startY, initialLeft, initialTop;
    const startDrag = (e) => {
        isDragging = true;
        const pageX = (e.pageX || e.touches[0].pageX);
        const pageY = (e.pageY || e.touches[0].pageY);
        startX = pageX; startY = pageY;
        initialLeft = parseInt(photoImg.style.left) || 0;
        initialTop = parseInt(photoImg.style.top) || 0;
        photoArea.style.cursor = 'grabbing';
    };
    const doDrag = (e) => {
        if (!isDragging) return;
        const pageX = (e.pageX || e.touches[0].pageX);
        const pageY = (e.pageY || e.touches[0].pageY);
        photoImg.style.left = `${initialLeft + (pageX - startX)}px`;
        photoImg.style.top = `${initialTop + (pageY - startY)}px`;
    };
    const stopDrag = () => { isDragging = false; photoArea.style.cursor = 'move'; };

    photoArea.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', doDrag);
    window.addEventListener('mouseup', stopDrag);
    photoArea.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', doDrag);
    window.addEventListener('touchend', stopDrag);

    $('downBtn').onclick = () => {
        html2canvas($('cardCapture'), { scale: 4, useCORS: true, backgroundColor: null }).then(c => {
            const l = document.createElement('a');
            l.download = `BlackRock_Classic_ID.png`;
            l.href = c.toDataURL('image/png');
            l.click();
        });
    };
</script>
</body>
</html>
