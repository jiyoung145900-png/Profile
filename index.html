<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BANADA 최종 완성본</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        body { background: #0b0b0c; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .control-panel { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="control-panel">
        <label>로고 가로 크기: </label><input type="range" id="logoW" min="50" max="300" value="150">
        <label>위치 (X): </label><input type="range" id="logoX" min="0" max="360" value="100">
        <label>위치 (Y): </label><input type="range" id="logoY" min="0" max="300" value="20">
    </div>
    
    <button id="upload_widget" style="padding:15px; background:#d4af37; border:none; cursor:pointer;">영상 합성 시작</button>
    <div id="result"></div>

    <script>
        document.getElementById("upload_widget").addEventListener("click", () => {
            const w = document.getElementById('logoW').value;
            const x = document.getElementById('logoX').value;
            const y = document.getElementById('logoY').value;

            cloudinary.createUploadWidget({
                cloudName: 'dwla93cgd',
                uploadPreset: 'banada_profile_preset',
                // 슬라이더 값을 동적으로 합성 주소에 넣습니다.
                transformation: [{ 
                    overlay: "5b206172-ddc1-4a95-a34e-c197ccb0eb10",
                    gravity: "north_west",
                    x: x, y: y, width: w 
                }]
            }, (error, result) => {
                if (result.event === "success") {
                    document.getElementById('result').innerHTML = `<video src="${result.info.secure_url}" controls width="360"></video>`;
                }
            }).open();
        });
    </script>
</body>
</html>
