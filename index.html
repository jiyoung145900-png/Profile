<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRock Korea Final ID</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --br-black: #000000; 
            --br-blue-main: #0076ff;
            --br-blue-dark: #003a8c;
        }
        body { font-family: 'Inter', sans-serif; background-color: #111; padding: 40px; display: flex; flex-direction: column; align-items: center; color: white; }
        .wrapper { display: flex; gap: 40px; max-width: 1200px; width: 100%; justify-content: center; }
        
        /* 설정 패널 */
        .input-panel { width: 380px; background: #1a1a1a; padding: 25px; border-radius: 4px; border: 1px solid #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 11px; color: #888; text-transform: uppercase; font-weight: 700; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; }
        .btn-update { background: white; color: black; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: 900; margin-top: 10px; text-transform: uppercase; }

        /* 사원증 디자인 - [수정] 짤림 방지 및 패턴 강화 */
        .id-card { 
            width: 380px; height: 620px; background: white; position: relative; color: black;
            display: flex; flex-direction: column; align-items: center; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* [수정] 블루 다이아몬드 패턴 헤더 */
        .card-header { 
            width: 100%; height: 100px; background: var(--br-black); position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; padding-left: 25px;
        }
        .pattern-bg {
            position: absolute; top: 0; right: 0; width: 65%; height: 100%;
            background: linear-gradient(135deg, var(--br-blue-dark) 25%, transparent 25%) -25px 0,
                        linear-gradient(225deg, var(--br-blue-dark) 25%, transparent 25%) -25px 0,
                        linear-gradient(45deg, var(--br-blue-dark) 25%, transparent 25%),
                        linear-gradient(315deg, var(--br-blue-dark) 25%, var(--br-black) 25%);
            background-size: 50px 50px; opacity: 0.9; transform: skewX(-10deg) translateX(20px);
        }
        .header-overlay { position: absolute; inset: 0; background: linear-gradient(to right, #000 45%, transparent 80%); }

        .br-logo-text { color: white; font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 34px; letter-spacing: -2px; position: relative; z-index: 1; }
        .br-korea-text { color: #009cff; font-weight: 800; font-size: 13px; letter-spacing: 2px; position: relative; z-index: 1; }
        .header-stripe { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: #009cff; z-index: 2; }

        /* [수정] 사진 영역 - 짤림 방지 */
        .photo-container {
            width: 280px; height: 320px; margin-top: 35px; position: relative;
        }
        .photo-frame {
            width: 100%; height: 100%; background-color: #eee; border: 1px solid #ddd;
            background-size: contain; background-position: center; background-repeat: no-repeat;
        }
        .ic-chip {
            position: absolute; top: 80px; right: -40px; width: 55px; height: 45px;
            background: linear-gradient(135deg, #d4af37, #f7e2a9, #d4af37);
            border-radius: 6px; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 인적사항 */
        .card-info { width: 100%; padding: 25px 40px; text-align: left; }
        .emp-name { font-size: 34px; font-weight: 900; text-transform: uppercase; margin-bottom: 2px; letter-spacing: -1.5px; }
        .emp-role { font-size: 16px; font-weight: 800; color: var(--br-blue-main); text-transform: uppercase; margin-bottom: 20px; }
        
        .info-grid { font-size: 12px; width: 100%; }
        .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; }
        .info-label { color: #999; font-weight: 700; text-transform: uppercase; }
        .info-value { color: #222; font-weight: 800; }

        .barcode-area { position: absolute; bottom: 15px; width: 100%; text-align: center; }
        .barcode-img { width: 85%; height: 35px; filter: grayscale(1); mix-blend-mode: multiply; }
        .footer-text { font-size: 9px; color: #bbb; letter-spacing: 1px; margin-top: 8px; font-weight: 700; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="input-panel">
        <h3>BLACKROCK ID SYSTEM</h3>
        <div class="form-group"><label>Photo</label><input type="file" id="photoIn"></div>
        <div class="form-group"><label>Full Name</label><input type="text" id="nameIn" value="NOEUL KANG"></div>
        <div class="form-group"><label>Title</label><select id="roleIn">
            <option value="VICE PRESIDENT">VICE PRESIDENT</option>
            <option value="MANAGING DIRECTOR">MANAGING DIRECTOR</option>
            <option value="ANALYST">ANALYST</option>
        </select></div>
        <div class="form-group"><label>Unit</label><input type="text" id="deptIn" value="Korea Fixed Income"></div>
        <div class="form-group"><label>ID No.</label><input type="text" id="idIn" value="BLK-KR-8821"></div>
        
        <button class="btn-update" id="applyBtn">Apply Changes</button>
        <button class="btn-update" id="downBtn" style="background:#000; color:#fff; border:1px solid #333;">Download 4K ID</button>
    </div>

    <div id="cardCapture" class="id-card">
        <div class="card-header">
            <div class="pattern-bg"></div>
            <div class="header-overlay"></div>
            <div class="br-logo-text">BLACKROCK</div>
            <div class="br-korea-text">KOREA</div>
            <div class="header-stripe"></div>
        </div>

        <div class="photo-container">
            <div class="photo-frame" id="photoFrame" style="background-image: url('https://via.placeholder.com/280x320?text=Profile+Photo');"></div>
            <div class="ic-chip"></div>
        </div>

        <div class="card-info">
            <div class="emp-name" id="nameOut">NOEUL KANG</div>
            <div class="emp-role" id="roleOut">VICE PRESIDENT</div>
            <div class="info-grid">
                <div class="info-row"><span class="info-label">Unit</span><span class="info-value" id="deptOut">Korea Fixed Income</span></div>
                <div class="info-row"><span class="info-label">Issue Date</span><span class="info-value">14 APR 2026</span></div>
                <div class="info-row"><span class="info-label">Location</span><span class="info-value">SEOUL, KOREA</span></div>
                <div class="info-row"><span class="info-label">Status</span><span class="info-value">ACTIVE</span></div>
            </div>
        </div>

        <div class="barcode-area">
            <img src="https://www.scandit.com/wp-content/themes/scandit/img/barcode-types/code-128.png" class="barcode-img">
            <div class="footer-text">BLACKROCK ADVISORS (KOREA) 2026</div>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);
    $('photoIn').onchange = function(e) {
        if(this.files[0]) {
            const r = new FileReader();
            r.onload = e => $('photoFrame').style.backgroundImage = `url('${e.target.result}')`;
            r.readAsDataURL(this.files[0]);
        }
    };
    $('applyBtn').onclick = () => {
        $('nameOut').innerText = $('nameIn').value;
        $('roleOut').innerText = $('roleIn').value;
        $('deptOut').innerText = $('deptIn').value;
    };
    $('downBtn').onclick = () => {
        html2canvas($('cardCapture'), {scale: 5, useCORS: true}).then(c => {
            const l = document.createElement('a');
            l.download = `BLK_ID_${$('nameIn').value}.png`;
            l.href = c.toDataURL();
            l.click();
        });
    };
</script>
</body>
</html>
