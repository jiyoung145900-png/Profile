<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BANADA 최종 통합 프로필 생성기</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #121212; color: white; display: flex; gap: 30px; padding: 30px; justify-content: center; }
        .controls { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 380px; display: flex; flex-direction: column; gap: 10px; }
        input { background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { background: #d4af37; color: black; font-weight: bold; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        canvas { border-radius: 16px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div class="controls">
        <h2>BANADA 통합 프로필기</h2>
        <input type="file" id="videoInput" accept="video/mp4">
        <input type="file" id="logoInput" accept="image/png">
        
        <label>로고 조절 (크기 / X위치 / Y위치)</label>
        <div style="display:flex; gap:5px;">
            <input type="range" id="logoW" min="50" max="300" value="150">
            <input type="range" id="logoX" min="0" max="360" value="105">
            <input type="range" id="logoY" min="0" max="300" value="40">
        </div>

        <input type="text" id="nameInput" value="예인" placeholder="이름">
        <input type="text" id="detailsInput" value="28세 | 163CM / 47KG | C컵" placeholder="상세정보">
        <input type="text" id="sloganInput" value="A WORLD OF ELEGANCE & PASSION.">

        <button id="uploadBtn">📥 GIF 생성 및 클라우드 업로드</button>
    </div>

    <video id="v" style="display:none;" loop muted playsinline></video>
    <img id="logo" style="display:none;">
    <canvas id="c" width="360" height="640"></canvas>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('v');
    const logo = document.getElementById('logo');

    document.getElementById('videoInput').onchange = (e) => { video.src = URL.createObjectURL(e.target.files[0]); video.play(); };
    document.getElementById('logoInput').onchange = (e) => { logo.src = URL.createObjectURL(e.target.files[0]); };

    function draw() {
        ctx.drawImage(video, 0, 0, 360, 640);
        const w = document.getElementById('logoW').value;
        const x = document.getElementById('logoX').value;
        const y = document.getElementById('logoY').value;
        if(logo.src) ctx.drawImage(logo, x, y, w, w * (logo.naturalHeight / logo.naturalWidth));
        
        ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 500, 360, 140);
        ctx.fillStyle = "#d4af37"; ctx.font = "bold 30px Pretendard"; ctx.textAlign = "center";
        ctx.fillText(document.getElementById('nameInput').value, 180, 550);
        ctx.fillStyle = "#fff"; ctx.font = "16px Pretendard";
        ctx.fillText(document.getElementById('detailsInput').value, 180, 580);
        ctx.fillStyle = "#d4af37"; ctx.font = "italic 12px serif";
        ctx.fillText(document.getElementById('sloganInput').value, 180, 610);
        requestAnimationFrame(draw);
    }
    draw();

    // 클라우드너리 업로드 연동
    const myWidget = cloudinary.createUploadWidget({
        cloudName: 'dwla93cgd', 
        uploadPreset: 'banada_profile_preset',
        // 영상 전송 시 GIF로 변환 명령
        transformation: [{ format: "gif", width: 360, height: 640, crop: "fill" }]
    }, (error, result) => {
        if (!error && result && result.event === "success") {
            alert("✅ 업로드 완료! GIF로 변환 중입니다.");
            window.open(result.info.secure_url.replace('.mp4', '.gif'));
        }
    });

    document.getElementById('uploadBtn').onclick = () => {
        // 캔버스 데이터 추출 후 업로드
        canvas.toBlob(blob => {
            const file = new File([blob], "profile.mp4", { type: "video/mp4" });
            myWidget.open(); // 위젯을 열어 업로드 실행
        }, "video/mp4");
    };
</script>
</body>
</html>
