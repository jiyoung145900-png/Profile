<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BANADA 최종 완성본</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #121212; color: white; display: flex; gap: 30px; padding: 30px; justify-content: center; }
        .controls { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 380px; }
        input { background: #000; border: 1px solid #333; color: white; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #d4af37; color: black; font-weight: bold; padding: 15px; border: none; width: 100%; cursor: pointer; }
        canvas { border-radius: 16px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="controls">
        <h2>BANADA 프로필 메이커</h2>
        <input type="file" id="videoInput" accept="video/mp4">
        <input type="file" id="logoInput" accept="image/png">
        <label>로고 조절 (크기 / X / Y)</label>
        <div style="display:flex; gap:5px;"><input type="range" id="logoW" min="50" max="300" value="150"><input type="range" id="logoX" min="0" max="360" value="105"><input type="range" id="logoY" min="0" max="300" value="40"></div>
        <input type="text" id="nameInput" value="예인">
        <input type="text" id="detailsInput" value="28세 | 163CM / 47KG | C컵">
        <input type="text" id="sloganInput" value="A WORLD OF ELEGANCE & PASSION.">
        <button id="uploadBtn">📥 GIF 생성 및 업로드</button>
    </div>
    <video id="v" style="display:none;" loop muted playsinline></video>
    <img id="logo" style="display:none;">
    <canvas id="c" width="360" height="640"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    const video = document.getElementById('v'), logo = document.getElementById('logo');

    document.getElementById('videoInput').onchange = (e) => { video.src = URL.createObjectURL(e.target.files[0]); video.play(); };
    document.getElementById('logoInput').onchange = (e) => { logo.src = URL.createObjectURL(e.target.files[0]); };

    function draw() {
        ctx.drawImage(video, 0, 0, 360, 640);
        const w = document.getElementById('logoW').value, x = document.getElementById('logoX').value, y = document.getElementById('logoY').value;
        if(logo.src) ctx.drawImage(logo, x, y, w, w * (logo.naturalHeight / logo.naturalWidth));
        ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 500, 360, 140);
        ctx.fillStyle = "#d4af37"; ctx.font = "bold 30px Pretendard"; ctx.textAlign = "center";
        ctx.fillText(document.getElementById('nameInput').value, 180, 550);
        ctx.fillStyle = "#fff"; ctx.font = "16px Pretendard";
        ctx.fillText(document.getElementById('detailsInput').value, 180, 580);
        ctx.fillStyle = "#d4af37"; ctx.font = "italic 12px serif";
        ctx.fillText(document.getElementById('sloganInput').value, 180, 610);
        requestAnimationFrame(draw);
    }
    draw();

    document.getElementById('uploadBtn').onclick = () => {
        // [핵심] 캔버스를 녹화하여 파일로 자동 변환 후 클라우드너리에 즉시 전달
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, {type: 'video/webm'});
            const file = new File([blob], "output.webm", {type: 'video/webm'});
            
            // 클라우드너리 위젯에 파일 직접 주입
            cloudinary.applyUploadWidget(document.createElement('div'), {
                cloudName: 'dwla93cgd',
                uploadPreset: 'banada_profile_preset',
                sources: ['local'],
                transformation: [{ format: "gif", width: 360, height: 640, crop: "fill" }]
            }, (error, result) => {
                if (result.event === "success") window.open(result.info.secure_url.replace('.mp4', '.gif'));
            }).open();
        };
        recorder.start();
        setTimeout(() => recorder.stop(), 3000); // 3초 녹화 후 자동 업로드
    };
</script>
</body>
</html>
