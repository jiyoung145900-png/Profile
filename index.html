<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRock Institutional ID Generator</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Libre+Baskerville:ital@1&display=swap" rel="stylesheet">
    <style>
        :root { 
            --br-black: #000000; 
            --br-gray: #222222; 
            --br-silver: #e0e0e0;
            --accent-blue: #00b4ff;
        }
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; padding: 40px; display: flex; flex-direction: column; align-items: center; color: white; }
        .wrapper { display: flex; gap: 50px; max-width: 1300px; width: 100%; justify-content: center; align-items: flex-start; }
        
        /* 설정 패널 */
        .input-panel { width: 400px; background: #2d2d2d; padding: 25px; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #444; }
        .input-panel h3 { margin-top: 0; color: white; border-left: 4px solid var(--accent-blue); padding-left: 15px; font-size: 18px; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 0; background: #111; color: white; }
        
        .btn-generate { background: white; color: black; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: 900; font-size: 14px; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
        .btn-generate:hover { background: var(--accent-blue); color: white; }

        /* 사원증 카드 디자인 (Vertical ID Card) */
        .id-card { 
            width: 350px; height: 550px; background: white; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative; color: black;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 카드 상단 블랙록 로고바 */
        .card-header { 
            width: 100%; height: 80px; background: var(--br-black); display: flex; align-items: center; justify-content: center; position: relative;
        }
        .br-logo { color: white; font-weight: 900; font-size: 24px; letter-spacing: -1px; }

        /* 사진 영역 */
        .photo-frame {
            width: 220px; height: 260px; margin-top: 30px; background: #eee; border: 1px solid #ddd;
            background-size: cover; background-position: center; position: relative; overflow: hidden;
        }
        .photo-frame::after {
            content: ''; position: absolute; inset: 0; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        /* 인적사항 */
        .card-info { text-align: center; margin-top: 25px; width: 100%; padding: 0 30px; box-sizing: border-box; }
        .emp-name { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; color: #111; }
        .emp-role { font-size: 14px; font-weight: 700; color: #666; letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        .meta-info { display: flex; justify-content: space-between; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .meta-info b { color: #333; }

        /* 보안 요소: IC칩 & 바코드 */
        .ic-chip {
            position: absolute; left: 30px; top: 100px; width: 45px; height: 35px;
            background: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #d4af37 100%);
            border-radius: 6px; border: 1px solid rgba(0,0,0,0.1);
        }
        .barcode-area {
            position: absolute; bottom: 20px; width: 80%; text-align: center; opacity: 0.8;
        }
        .barcode-img { width: 100%; height: 40px; object-fit: cover; filter: grayscale(1); }
        .barcode-num { font-size: 10px; font-family: monospace; letter-spacing: 3px; margin-top: 4px; }

        /* 홀로그램 효과 */
        .hologram {
            position: absolute; right: 20px; top: 100px; width: 40px; height: 40px;
            background: radial-gradient(circle, #7db9ff, #ffffff); opacity: 0.3; border-radius: 50%;
            mix-blend-mode: multiply;
        }

        #downloadBtn { background: #333; color: white; border: 1px solid #555; }
    </style>
</head>
<body>

<h2 style="font-weight: 900; letter-spacing: -1px; margin-bottom: 40px;">BLACKROCK INSTITUTIONAL ID SYSTEM</h2>

<div class="wrapper">
    <div class="input-panel">
        <h3>1. EMPLOYEE DATA</h3>
        <div class="form-group">
            <label>Employee Photo</label>
            <input type="file" id="photoInput" accept="image/*">
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="inName" value="HONG GILDONG">
        </div>
        <div class="form-group">
            <label>Position / Title</label>
            <input type="text" id="inRole" value="Senior Portfolio Manager">
        </div>
        <div class="form-group">
            <label>Department</label>
            <select id="inDept">
                <option value="Global Equities">Global Equities</option>
                <option value="Fixed Income">Fixed Income</option>
                <option value="Multi-Asset Strategies">Multi-Asset Strategies</option>
                <option value="BlackRock Solutions">BlackRock Solutions</option>
                <option value="Risk Management">Risk Management</option>
            </select>
        </div>
        <div class="form-group">
            <label>Employee ID No.</label>
            <input type="text" id="inID" value="BR-7749-2026">
        </div>

        <button id="updateBtn" class="btn-generate">Apply & Re-Generate</button>
        <button id="downloadBtn" class="btn-generate">Download Ultra-HD Image</button>
    </div>

    <div class="output-panel">
        <div class="id-card" id="cardCapture">
            <div class="card-header">
                <div class="br-logo">BLACKROCK</div>
            </div>
            
            <div class="ic-chip"></div>
            <div class="hologram"></div>
            
            <div class="photo-frame" id="photoZone" style="background-image: url('https://via.placeholder.com/220x260?text=Profile+Photo');"></div>

            <div class="card-body card-info">
                <div class="emp-name" id="outName">HONG GILDONG</div>
                <div class="emp-role" id="outRole">Senior Portfolio Manager</div>
                
                <div class="meta-info">
                    <span>Department</span>
                    <b><span id="outDept">Global Equities</span></b>
                </div>
                <div class="meta-info">
                    <span>Issue Date</span>
                    <b>APR 2026</b>
                </div>
                <div class="meta-info">
                    <span>Expiry Date</span>
                    <b>APR 2031</b>
                </div>
                <div class="meta-info">
                    <span>Access Level</span>
                    <b style="color:red;">LEVEL 4</b>
                </div>
            </div>

            <div class="barcode-area">
                <img src="https://www.scandit.com/wp-content/themes/scandit/img/barcode-types/code-128.png" class="barcode-img">
                <div class="barcode-num" id="outID">BR-7749-2026</div>
            </div>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);

    // 사진 업로드 처리
    $('photoInput').addEventListener('change', function(e) {
        if (this.files[0]) {
            const reader = new FileReader();
            reader.onload = (ex) => { $('photoZone').style.backgroundImage = `url('${ex.target.result}')`; };
            reader.readAsDataURL(this.files[0]);
        }
    });

    // 정보 업데이트
    $('updateBtn').addEventListener('click', () => {
        $('outName').innerText = $('inName').value;
        $('outRole').innerText = $('inRole').value;
        $('outDept').innerText = $('inDept').value;
        $('outID').innerText = $('inID').value;
    });

    // 고화질 다운로드
    $('downloadBtn').addEventListener('click', () => {
        const btn = $('downloadBtn');
        btn.innerText = "PROCESSING...";
        html2canvas($('cardCapture'), {
            scale: 5, // 훨씬 선명하게 (5배수)
            useCORS: true,
            backgroundColor: null
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `BlackRock_ID_${$('inName').value}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btn.innerText = "Download Ultra-HD Image";
        });
    });
</script>

</body>
</html>
