<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BANADA 캔버스 프로필 생성기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .editor { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .controls { background: #1a1a1a; padding: 20px; border-radius: 12px; width: 350px; }
        canvas { border: 1px solid #333; border-radius: 8px; cursor: crosshair; }
        input { display: block; width: 100%; margin: 5px 0 15px; padding: 8px; border-radius: 4px; border: none; }
        button { width: 100%; padding: 15px; background: #d4af37; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="editor">
    <div class="controls">
        <h2>BANADA 프로필 메이커</h2>
        <label>영상/로고 선택</label>
        <input type="file" id="vid" accept="video/mp4">
        <input type="file" id="log" accept="image/png">
        
        <label>로고 조절 (크기 / X / Y)</label>
        <div style="display:flex; gap:5px;"><input type="range" id="w" min="50" max="300" value="150"><input type="range" id="x" min="0" max="360" value="100"><input type="range" id="y" min="0" max="300" value="50"></div>
        
        <label>프로필 정보</label>
        <input type="text" id="name" value="예인">
        <input type="text" id="info" value="28세 | 163CM | 47KG | C컵">
        <button id="save">📥 GIF/영상으로 저장 (다운로드)</button>
    </div>

    <canvas id="c" width="360" height="640"></canvas>
</div>

<video id="v" style="display:none;" loop muted playsinline></video>
<img id="l" style="display:none;">

<script>
    const c = document.getElementById('c'), ctx = c.getContext('2d');
    const v = document.getElementById('v'), l = document.getElementById('l');

    document.getElementById('vid').onchange = (e) => { v.src = URL.createObjectURL(e.target.files[0]); v.play(); };
    document.getElementById('log').onchange = (e) => { l.src = URL.createObjectURL(e.target.files[0]); };

    function render() {
        ctx.drawImage(v, 0, 0, 360, 640);
        const w = document.getElementById('w').value, x = document.getElementById('x').value, y = document.getElementById('y').value;
        if(l.src) ctx.drawImage(l, x, y, w, w * (l.naturalHeight / l.naturalWidth));
        
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 500, 360, 140);
        ctx.fillStyle = "#d4af37"; ctx.font = "bold 28px Pretendard"; ctx.textAlign = "center";
        ctx.fillText(document.getElementById('name').value, 180, 550);
        ctx.fillStyle = "#fff"; ctx.font = "16px Pretendard";
        ctx.fillText(document.getElementById('info').value, 180, 580);
        requestAnimationFrame(render);
    }
    render();

    document.getElementById('save').onclick = () => {
        const stream = c.captureStream(30);
        const recorder = new MediaRecorder(stream, {mimeType: 'video/webm'});
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob(chunks, {type: 'video/webm'}));
            a.download = 'BANADA_Profile.webm';
            a.click();
        };
        recorder.start();
        setTimeout(() => recorder.stop(), 3000);
    };
</script>
</body>
</html>
