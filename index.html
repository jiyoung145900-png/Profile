<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRock Institutional ID Generator (V3.0)</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --br-black: #000000; 
            --accent-blue: #0066ff;
            --br-gold: #b89535;
        }
        body { font-family: 'Inter', sans-serif; background-color: #050505; padding: 40px; display: flex; flex-direction: column; align-items: center; color: white; }
        .wrapper { display: flex; gap: 50px; max-width: 1300px; width: 100%; justify-content: center; align-items: flex-start; }
        
        /* 설정 패널 */
        .input-panel { width: 400px; background: #111; padding: 30px; border-radius: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #333; }
        .input-panel h3 { margin-top: 0; color: white; border-left: 5px solid white; padding-left: 15px; font-weight: 900; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #222; background: #000; color: white; font-size: 14px; }
        
        .btn-generate { background: white; color: black; border: none; padding: 18px; cursor: pointer; width: 100%; font-weight: 900; text-transform: uppercase; margin-top: 15px; transition: 0.3s; }
        .btn-generate:hover { background: #ccc; }

        /* 사원증 카드 디자인 */
        .id-card { 
            width: 360px; height: 580px; background: white; border-radius: 4px; overflow: hidden; 
            box-shadow: 0 50px 100px rgba(0,0,0,1); position: relative; color: black;
            display: flex; flex-direction: column; align-items: center;
        }

        /* [수정] 블랙록 공식 스타일 로고바 */
        .card-header { 
            width: 100%; height: 90px; background: var(--br-black); display: flex; align-items: center; padding-left: 30px; position: relative;
        }
        /* 블랙록 공식 폰트 스타일 (Bold & Condensed 느낌) */
        .br-logo-text { 
            color: white; font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 34px; letter-spacing: -2px; 
            transform: scaleY(1.1); /* 세로로 살짝 늘려 권위감 부여 */
        }
        .header-stripe { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--accent-blue); }

        /* 보안 요소 (사진과 겹치지 않게 우측 배치) */
        .ic-chip {
            position: absolute; right: 30px; top: 110px; width: 50px; height: 40px;
            background: linear-gradient(135deg, #c5a059 0%, #f7e2a9 50%, #c5a059 100%);
            border-radius: 5px; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 사진 영역 */
        .photo-frame {
            width: 230px; height: 280px; margin-top: 40px; background: #eee; 
            background-size: cover; background-position: center; border: 1px solid #ddd;
        }

        /* 인적사항 */
        .card-info { text-align: left; width: 100%; padding: 30px 40px; box-sizing: border-box; }
        .emp-name { font-size: 30px; font-weight: 900; text-transform: uppercase; color: #000; letter-spacing: -1px; margin-bottom: 5px; }
        .emp-role { font-size: 14px; font-weight: 700; color: var(--accent-blue); text-transform: uppercase; margin-bottom: 25px; }
        
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .info-label { font-size: 10px; color: #999; text-transform: uppercase; font-weight: 700; }
        .info-value { font-size: 12px; color: #333; font-weight: 700; }

        /* 하단 바코드 */
        .barcode-area { position: absolute; bottom: 20px; width: 100%; text-align: center; }
        .barcode-img { width: 80%; height: 35px; filter: contrast(150%); }
        .barcode-num { font-size: 10px; font-family: monospace; letter-spacing: 3px; color: #888; margin-top: 5px; }

        #downloadBtn { background: #222; color: #fff; margin-top: 10px; }
    </style>
</head>
<body>

<h2 style="font-weight: 900; letter-spacing: -1px; margin-bottom: 40px; color: #fff;">BLACKROCK ID ISSUANCE SYSTEM</h2>

<div class="wrapper">
    <div class="input-panel">
        <h3>ID CONFIGURATION</h3>
        <div class="form-group">
            <label>Employee Photo</label>
            <input type="file" id="photoInput" accept="image/*">
        </div>
        <div class="form-group">
            <label>Employee Name</label>
            <input type="text" id="inName" value="LARRY FINK">
        </div>
        <div class="form-group">
            <label>Official Title</label>
            <input type="text" id="inRole" value="Managing Director">
        </div>
        <div class="form-group">
            <label>Business Unit</label>
            <input type="text" id="inDept" value="Institutional Client Business">
        </div>
        <div class="form-group">
            <label>Serial Number</label>
            <input type="text" id="inID" value="BLK-9982-2026">
        </div>

        <button id="updateBtn" class="btn-generate">Apply Changes</button>
        <button id="downloadBtn" class="btn-generate">Download 4K Image</button>
    </div>

    <div class="output-panel">
        <div class="id-card" id="cardCapture">
            <div class="card-header">
                <div class="br-logo-text">BLACKROCK</div>
                <div class="header-stripe"></div>
            </div>
            
            <div class="ic-chip"></div>
            
            <div class="photo-frame" id="photoZone" style="background-image: url('https://via.placeholder.com/230x280?text=Scan+Photo');"></div>

            <div class="card-info">
                <div class="emp-name" id="outName">LARRY FINK</div>
                <div class="emp-role" id="outRole">Managing Director</div>
                
                <div class="info-row"><span class="info-label">Unit</span><span class="info-value" id="outDept">Institutional Client Business</span></div>
                <div class="info-row"><span class="info-label">Issue Date</span><span class="info-value">14 APR 2026</span></div>
                <div class="info-row"><span class="info-label">Status</span><span class="info-value">PERMANENT</span></div>
                <div class="info-row"><span class="info-label">Clearance</span><span class="info-value" style="color:red;">UNRESTRICTED</span></div>
            </div>

            <div class="barcode-area">
                <img src="https://www.scandit.com/wp-content/themes/scandit/img/barcode-types/code-128.png" class="barcode-img">
                <div class="barcode-num" id="outID">BLK-9982-2026</div>
            </div>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);

    $('photoInput').addEventListener('change', function(e) {
        if (this.files[0]) {
            const reader = new FileReader();
            reader.onload = (ex) => { $('photoZone').style.backgroundImage = `url('${ex.target.result}')`; };
            reader.readAsDataURL(this.files[0]);
        }
    });

    $('updateBtn').addEventListener('click', () => {
        $('outName').innerText = $('inName').value;
        $('outRole').innerText = $('inRole').value;
        $('outDept').innerText = $('inDept').value;
        $('outID').innerText = $('inID').value;
    });

    $('downloadBtn').addEventListener('click', () => {
        const btn = $('downloadBtn');
        btn.innerText = "GENERATING 4K IMAGE...";
        html2canvas($('cardCapture'), {
            scale: 5, 
            useCORS: true,
            backgroundColor: null
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `BlackRock_Asset_${$('inName').value}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btn.innerText = "Download 4K Image";
        });
    });
</script>

</body>
</html>
